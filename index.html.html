<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MS 主計算頁</title>

<style>
:root{--bg:#0f172a;--card:#111827;--muted:#94a3b8;--text:#e5e7eb;--line:#243041;--accent:#38bdf8}
*{box-sizing:border-box}
body{margin:0;background:linear-gradient(180deg,#0b1220,#0f172a);color:var(--text);
font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial,"Noto Sans TC",sans-serif}
.wrap{max-width:1680px;margin:0 auto;padding:24px}
h1{margin:0 0 8px;font-size:28px}
h2{font-size:18px;margin:0 0 12px}
h3{font-size:13px;margin:10px 0 6px;color:#94a3b8}

.grid{display:grid;grid-template-columns:1.35fr 1.15fr;gap:16px}
.stack{display:grid;gap:14px}
.card{background:#111827;border:1px solid var(--line);border-radius:16px;padding:16px}

label{font-size:13px;color:#cbd5e1}
input,select{width:100%;padding:8px;border-radius:8px;background:#0b1220;color:white;border:1px solid #334155}

.row4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.row3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}

.muted{font-size:12px;color:var(--muted)}
</style>
</head>

<body>
<div class="wrap">

<div class="grid">

<div class="stack">

<div class="card">
<h2>每日 / 每週項目</h2>

<div class="row4">
<div><label>總共幾週</label><input id="totalWeeks" type="number"></div>
<div><label>怪物公園每週次數</label><input id="parkRunsPerWeek" type="number"></div>
<div><label>怪公倍率%</label><input id="extParkBonus" type="number"></div>
<div><label>每日260以下%</label><input id="dailyBonusUnder260" type="number"></div>
</div>

<div class="row4">
<div><label>每日260以上%</label><input id="dailyBonus260Plus" type="number"></div>
<div><label>200區</label><input id="d200runsPerWeek" type="number"></div>
<div><label>245區</label><input id="d245runsPerWeek" type="number"></div>
<div><label>260區</label><input id="d260runsPerWeek" type="number"></div>
</div>

<div class="row3">
<div><label>紅月週數</label><input id="redMoonWeeks" type="number"></div>
<div>
<label>紅月倍率</label>
<select id="redMoonMode">
<option value="0">0倍</option>
<option value="1">1倍</option>
<option value="2">2倍</option>
</select>
</div>
<div><label>極怪公週數</label><input id="extParkWeeks" type="number"></div>
</div>

</div>

</div>

<div class="stack">
<div class="card">
<h2>結果</h2>

<div id="out"></div>

</div>
</div>

</div>

<script>

function num(v){return Number(v)||0}

function calc(){

const parkBonus = 1 + num(extParkBonus.value)/100

const dailyUnder = 1 + num(dailyBonusUnder260.value)/100
const dailyOver = 1 + num(dailyBonus260Plus.value)/100

const redMoonModeVal = num(redMoonMode.value)

let total = 0

// 每日
total += 100 * num(d200runsPerWeek.value)*num(totalWeeks.value)*dailyUnder
total += 200 * num(d245runsPerWeek.value)*num(totalWeeks.value)*dailyUnder
total += 300 * num(d260runsPerWeek.value)*num(totalWeeks.value)*dailyOver

// 怪公
const runs = num(parkRunsPerWeek.value)
const extra = Math.min(7, Math.max(0, runs-7))
const effective = runs + extra*0.5
total += 1000 * effective * num(totalWeeks.value) * parkBonus

// 紅月
total += 5000 * num(redMoonWeeks.value) * redMoonModeVal

// 極怪公
total += 8000 * num(extParkWeeks.value) * parkBonus

out.innerText = "總EXP：" + total

}

document.querySelectorAll("input,select").forEach(el=>el.addEventListener("input",calc))
calc()

</script>

</body>
</html>
