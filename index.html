<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MS 主計算頁</title>

<style>
:root{--bg:#0f172a;--card:#111827;--muted:#94a3b8;--text:#e5e7eb;--line:#243041;}
body{margin:0;background:#0f172a;color:#e5e7eb;font-family:system-ui}
.wrap{max-width:1500px;margin:auto;padding:20px}
.nav a{margin-right:10px;color:#7dd3fc;text-decoration:none}
.card{background:#111827;padding:16px;border-radius:14px;margin-bottom:14px;border:1px solid #243041}
.grid{display:grid;grid-template-columns:1.3fr 1fr;gap:16px}
.stack{display:flex;flex-direction:column}
.row4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
input{width:100%;padding:6px}
</style>
</head>

<body>
<div class="wrap">

<div class="nav">
<a href="./index.html">主計算頁</a>
<a href="./MS_狩獵經驗％計算.html">狩獵經驗%</a>
<a href="./MS_狩獵效率.html">狩獵效率</a>
<a href="./MS_活動資源等值高階EXP.html">活動資源</a>
<a href="./MS_VIP掛機推估.html">VIP掛機</a>
</div>

<h1>MS 主計算頁</h1>

<div class="grid">

<!-- ✅ 左側（輸入） -->
<div class="stack">

<div class="card">
<h2>基本設定</h2>
<input placeholder="等級">
</div>

<div class="card">
<h2>狩獵設定</h2>
<input placeholder="倍率 / 怪物數">
</div>

<div class="card">
<h2>每日 / 每週項目</h2>
<input placeholder="各種週期內容">
</div>

<!-- ✅ 活動區 ✅（正確保留） -->
<div class="card">
<h2>活動區</h2>
<input placeholder="番茄 / 桑拿 / EXPRESS">
</div>

<!-- ✅ ✅ 水系統（正確：最底 + 同一欄） -->
<div class="card">
<h2>水系統</h2>
<div class="row4">
<div><input id="w249" placeholder="249水"></div>
<div><input id="w259" placeholder="259水"></div>
<div><input id="w269" placeholder="269水"></div>
<div><input id="w274" placeholder="274水"></div>
</div>
</div>

</div>

<!-- ✅ 右側（結果） -->
<div class="stack">

<div class="card">
<h2>計算結果</h2>
<p>最終等級 / EXP</p>
</div>

<div class="card">
<h2>來源拆解</h2>
<p>各來源EXP</p>
</div>

<div class="card">
<h2>基礎資料</h2>
<p>怪物EXP / 高階EXP</p>
</div>

</div>

</div>
</div>
</body>
</html>
