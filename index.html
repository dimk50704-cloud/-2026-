<div class="grid">

  <!-- ✅ 左側 -->

    <div class="card">

        <div><label>目前等級</label><select id="level"></select></div>
        <div><label>目前經驗 %</label><input id="levelPct" type="number" value="0"></div>

    <div class="card">
      <h2>狩獵設定</h2>
      <div class="row3">

        <div><label>狩獵數量</label><input id="huntingCount"></div>
      </div>
    </div>

    <div class="card">
      <h2>每日 / 每週項目</h2>
      <div class="row3">
        <div><input id="totalWeeks"></div>
        <div><input id="parkRunsPerWeek"></div>
        <div><input id="extParkBonus"></div>
      </div>
    </div>

    <!-- ✅ ✅ 活動區 -->
    <div class="card">
      <h2>活動區</h2>

      <div class="row3">
        <div><input id="normalBoosterCount"></div>
        <div><input id="expressCount"></div>
        <div><input id="steelCount"></div>
      </div>

      <div class="row3 section-gap">
        <div><input id="tomatoRuns"></div>
        <div><input id="tomatoAvg"></div>
        <div><input id="saunaHours"></div>
      </div>
    </div>

    <!-- ✅ ✅ ✅ 水系統（修正） -->
    <div class="card">
      <h2>水系統</h2>

      <div class="row4">
        <div><input id="w249"></div>
        <div><input id="w259"></div>
        <div><input id="w269"></div>
        <div><input id="w274"></div>
      </div>
    </div>

  </div>

  <!-- ✅ 右側（完全保留） -->
  <div class="stack">
    <div class="card">
      <h2>計算結果</h2>
      <div id="kpiFinal"></div>
      <div id="kpiExp"></div>
    </div>

    <div class="card">
      <h2>來源拆解</h2>
      <table id="breakdown"></table>
    </div>

  </div>

</div>
