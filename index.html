<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MS 主計算頁</title>

<style>
:root{--bg:#0f172a;--card:#111827;--muted:#94a3b8;--text:#e5e7eb;--line:#243041}
*{box-sizing:border-box}
body{margin:0;background:linear-gradient(180deg,#0b1220,#0f172a);color:var(--text);font-family:ui-sans-serif,system-ui}
.wrap{max-width:1680px;margin:0 auto;padding:24px}
.nav{display:flex;gap:10px;margin-bottom:16px}
.nav a{color:#bae6fd;text-decoration:none;background:#082f49;padding:8px 12px;border-radius:999px}
.grid{display:grid;grid-template-columns:1.35fr 1.15fr;gap:16px}
.stack{display:grid;gap:14px}
.card{background:#111827;border-radius:16px;padding:16px;border:1px solid #243041}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.row3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.row4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
input,select{width:100%;padding:8px;background:#0b1220;color:white;border:1px solid #334155;border-radius:8px}
</style>
</head>

<body>
<div class="wrap">

<div class="nav">
<a href="./index.html">主計算頁</a>
<a href="./MS_狩獵經驗％計算.html">狩獵經驗%</a>
<a href="./MS_狩獵效率.html">狩獵效率</a>
<a href="./MS_活動資源等值高階EXP.html">活動資源</a>
<a href="./MS_VIP掛機推估.html">VIP掛機</a>
</div>

<h1>MS 主計算頁</h1>

<div class="grid">

<!-- ✅ 左側 -->
<div class="stack">

<div class="card">
<h2>基本設定</h2>
<div class="row">
<div><input id="level"></div>
<div><input id="levelPct"></div>
</div>
</div>

<div class="card">
<h2>狩獵設定</h2>
<div class="row3">
<input id="baseRate" value="600">
<input id="wheelExtra">
<input id="huntingCount">
</div>
</div>

<div class="card">
<h2>每日 / 每週</h2>
<div class="row3">
<input id="totalWeeks">
<input id="parkRunsPerWeek">
<input id="extParkBonus">
</div>
</div>

<!-- ✅ 活動區 -->
<div class="card">
<h2>活動區</h2>
<div class="row3">
<input id="normalBoosterCount">
<input id="expressCount">
<input id="steelCount">
</div>

<div class="row3">
<input id="tomatoRuns">
<input id="tomatoAvg">
<input id="saunaHours">
</div>
</div>

<!-- ✅ ✅ ✅ 水系統（已修好） -->
<div class="card">
<h2>水系統</h2>
<div class="row4">
<input id="w249">
<input id="w259">
<input id="w269">
<input id="w274">
</div>
</div>

</div>

<!-- ✅ 右側 -->
<div class="stack">

<div class="card">
<h2>結果</h2>
<div id="result"></div>
</div>

</div>

</div>
</div>

<script>
function num(v){return Number(v)||0}

function calc(){
let rate=num(baseRate.value)+(120*0.3*(1+num(wheelExtra.value)/100))

let park=num(parkRunsPerWeek.value)
let extra=Math.max(0,park-7)
let bonus=Math.min(7,extra)
let final=park+bonus*0.5

result.innerHTML=
"狩獵倍率："+rate.toFixed(2)+"%<br>"+
"怪物公園："+final.toFixed(2)
}

document.querySelectorAll("input").forEach(e=>e.oninput=calc)
calc()
</script>

</body>
</html>
